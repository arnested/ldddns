---
on: push
name: Build
permissions:
  contents: read
jobs:
  generated:
    name: Check generated code is up to date
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Go
        uses: arnested/setup-go@rc
        with:
          go-version-file: go.mod
      - name: go mod tidy
        uses: geomys/sandboxed-step@v1.2.1
        with:
          run: |
            go mod tidy
            git diff --exit-code
      - name: go generate
        uses: geomys/sandboxed-step@v1.2.1
        with:
          run: |
            go generate -x
            git diff --exit-code
  snapshot:
    name: Snapshot
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Go
        uses: arnested/setup-go@rc
        with:
          go-version-file: go.mod
      - name: go version
        run: go version
      - name: go mod verify
        run: go mod verify
      - name: go vet
        run: go vet ./...
      - name: go fmt ./..
        run: |
          go fmt ./...
          git diff --exit-code
      - name: Build changelog
        uses: geomys/sandboxed-step@v1.2.1
        with:
          persist-workspace-changes: 'true'
          run: go tool chglog init
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --snapshot
      - uses: actions/upload-artifact@v7
        with:
          name: Debian packages
          path: dist/*.deb

  nilaway:
    name: Nilaway
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Go
        uses: arnested/setup-go@rc
        with:
          go-version-file: go.mod
      - name: Run nilaway
        uses: geomys/sandboxed-step@v1.2.1
        with:
          run: go tool nilaway ./...
